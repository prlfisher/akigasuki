<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Anonymous Love Confessions ??</title>

        <style>
            * {
                    margin: 0;
                        padding: 0;
                            box-sizing: border-box;
                                font-family: 'Segoe UI', sans-serif;
                                }

                                body {
                                        min-height: 100vh;
                                            background: linear-gradient(135deg, #ff758c, #ff7eb3);
                                                display: flex;
                                                    justify-content: center;
                                                        align-items: center;
                                                            overflow-x: hidden;
                                }

                                .container {
                                        background: rgba(255,255,255,0.15);
                                            backdrop-filter: blur(15px);
                                                padding: 30px;
                                                    border-radius: 20px;
                                                        width: 95%;
                                                            max-width: 500px;
                                                                color: white;
                                                                    text-align: center;
                                                                        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
                                                                        }

                                                                        h1 {
                                                                                margin-bottom: 15px;
                                                                                }

                                                                                #confessionInput {
                                                                                        width: 100%;
                                                                                            padding: 10px;
                                                                                                border-radius: 10px;
                                                                                                    border: none;
                                                                                                        margin-top: 10px;
                                                                                                        }

                                                                                                        button {
                                                                                                            margin-top: 10px;
                                                                                                                padding: 10px 15px;
                                                                                                                    border: none;
                                                                                                                        border-radius: 20px;
                                                                                                                            background: white;
                                                                                                                                color: #ff4d6d;
                                                                                                                                    cursor: pointer;
                                                                                                                                        font-weight: bold;
                                                                                                                                        }

                                                                                                                                        button:hover {
                                                                                                                                            opacity: 0.8;
                                                                                                                                            }

                                                                                                                                            #messages {
                                                                                                                                                margin-top: 20px;
                                                                                                                                                    max-height: 250px;
                                                                                                                                                        overflow-y: auto;
                                                                                                                                                            text-align: left;
                                                                                                                                                            }

                                                                                                                                                            .message {
                                                                                                                                                                background: rgba(255,255,255,0.2);
                                                                                                                                                                    padding: 10px;
                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                            margin-bottom: 8px;
                                                                                                                                                                            }

                                                                                                                                                                            /* Floating Hearts */
                                                                                                                                                                            .heart {
                                                                                                                                                                                position: fixed;
                                                                                                                                                                                    bottom: -10px;
                                                                                                                                                                                        font-size: 20px;
                                                                                                                                                                                            animation: floatUp 5s linear infinite;
                                                                                                                                                                                                color: white;
                                                                                                                                                                                                }

                                                                                                                                                                                                @keyframes floatUp {
                                                                                                                                                                                                    0% { transform: translateY(0); opacity: 1; }
                                                                                                                                                                                                        100% { transform: translateY(-100vh); opacity: 0; }
                                                                                                                                                                                                        }
                                                                                                                                                                                                        </style>
                                                                                                                                                                                                        </head>

                                                                                                                                                                                                        <body>

                                                                                                                                                                                                        <div class="container">
                                                                                                                                                                                                            <h1>?? Anonymous Love Confessions</h1>
                                                                                                                                                                                                                <p>Say what your heart feels...</p>

                                                                                                                                                                                                                    <textarea id="confessionInput" rows="3" placeholder="Write your confession..."></textarea>
                                                                                                                                                                                                                        <button onclick="postConfession()">Post ??</button>

                                                                                                                                                                                                                            <div id="messages"></div>
                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                            <!-- Firebase -->
                                                                                                                                                                                                                            <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
                                                                                                                                                                                                                            <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>

                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                            /* ?? STEP 1: PASTE YOUR FIREBASE CONFIG HERE */
                                                                                                                                                                                                                            const firebaseConfig = {
                                                                                                                                                                                                                              apiKey: "AIzaSyAVwHUPpyJPQBgvJE43DIDap0gQM-0oJHc",
                                                                                                                                                                                                                                authDomain: "akiga-suki.firebaseapp.com",
                                                                                                                                                                                                                                  databaseURL: "https://akiga-suki-default-rtdb.firebaseio.com",
                                                                                                                                                                                                                                    projectId: "akiga-suki",
                                                                                                                                                                                                                                      storageBucket: "akiga-suki.firebasestorage.app",
                                                                                                                                                                                                                                        messagingSenderId: "408278360988",
                                                                                                                                                                                                                                          appId: "1:408278360988:web:9fb66013ba7946e16b9e59"
                                                                                                                                                                                                                                          };

                                                                                                                                                                                                                                          firebase.initializeApp(firebaseConfig);
                                                                                                                                                                                                                                          const database = firebase.database();

                                                                                                                                                                                                                                          function postConfession() {
                                                                                                                                                                                                                                              const text = document.getElementById("confessionInput").value;
                                                                                                                                                                                                                                                  if (text.trim() === "") return;

                                                                                                                                                                                                                                                      database.ref("confessions").push({
                                                                                                                                                                                                                                                              message: text,
                                                                                                                                                                                                                                                                      time: Date.now()
                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                              document.getElementById("confessionInput").value = "";
                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                              database.ref("confessions").limitToLast(20).on("childadded", snapshot => {
                                                                                                                                                                                                                                                                                  const data = snapshot.val();
                                                                                                                                                                                                                                                                                      const div = document.createElement("div");
                                                                                                                                                                                                                                                                                          div.classList.add("message");
                                                                                                                                                                                                                                                                                              div.innerText = data.message;
                                                                                                                                                                                                                                                                                                  document.getElementById("messages").prepend(div);
                                                                                                                                                                                                                                                                                                  });

                                                                                                                                                                                                                                                                                                  /* Floating Hearts Generator */
                                                                                                                                                                                                                                                                                                  setInterval(() => {
                                                                                                                                                                                                                                                                                                      const heart = document.createElement("div");
                                                                                                                                                                                                                                                                                                          heart.classList.add("heart");
                                                                                                                                                                                                                                                                                                              heart.innerHTML = "??";
                                                                                                                                                                                                                                                                                                                  heart.style.left = Math.random() * 100 + "vw";
                                                                                                                                                                                                                                                                                                                      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
                                                                                                                                                                                                                                                                                                                          document.body.appendChild(heart);

                                                                                                                                                                                                                                                                                                                              setTimeout(() => heart.remove(), 5000);
                                                                                                                                                                                                                                                                                                                              }, 500);
                                                                                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                              </html>
                                                                                }
                                                                        }
                                }
                                }
            }
