<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confession</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

/* BODY */

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
height:160px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;

background-image:url("banner.jpg");
background-size:120% auto;
background-position:center 30%;
background-repeat:no-repeat;

box-shadow:0 6px 20px rgba(0,0,0,0.6);
}


/* HOME MESSAGE */

.homeMessage{
text-align:center;
font-size:28px;
padding:30px;
max-width:900px;
margin:auto;
}

/* LAYOUT */

.container{
flex:1;
display:grid;
grid-template-columns:240px 1fr 240px;
gap:20px;
padding:20px;
}

/* SIDEBAR */

.sidebar{
background:rgba(255,255,255,0.06);
border-radius:15px;
padding:15px;
backdrop-filter:blur(10px);
}

.postItem{
padding:8px;
cursor:pointer;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.postItem:hover{
color:#ff9ecb;
}

/* MAIN CONTENT */

.app{
background:rgba(255,255,255,0.08);
border-radius:15px;
padding:20px;
}

#postContent h2{
margin-bottom:10px;
}

/* COMMENTS */

.comment{
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* COMMENT BOX */

.commentBox{
margin:25px auto 0;
max-width:500px;
}

#name{
width:50%;
}

input,textarea{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-top:8px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
margin-top:8px;
padding:8px 14px;
border:none;
border-radius:20px;
background:#ff4d9d;
color:white;
cursor:pointer;
}

button:hover{
background:#ff1f7a;
}

/* EDITOR */

.editor{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:25px;
border-radius:10px;
width:400px;
max-width:90%;
z-index:10;
}

/* FOOTER */

footer{
background:rgba(0,0,0,0.6);
padding:12px;
text-align:center;
position:relative;
}

#adminBtn{
position:absolute;
right:10px;
bottom:6px;
opacity:0.15;
font-size:12px;
}

#adminBtn:hover{opacity:1;}

#logoutBtn{
position:absolute;
right:50px;
bottom:6px;
opacity:0.15;
font-size:12px;
display:none;
}

#logoutBtn:hover{opacity:1;}

/* MOBILE MENU */

.hamburger{
display:none;
position:fixed;
top:10px;
right:15px;
font-size:26px;
cursor:pointer;
}

.mobileMenu{
position:fixed;
top:0;
right:-260px;
width:240px;
height:100%;
background:#111;
padding:20px;
transition:right 0.35s ease;
z-index:1000;
}

.mobileMenu.open{
right:0;
}

#mobilePostList{
display:none;
max-width:600px;
margin:0 auto;
padding:15px;
text-align:left;
}

/* MOBILE POSTS (hidden on desktop) */

#mobilePostsTitle{
display:none;
}

#mobilePostList{
display:none;
}

#mobileToggle{
display:none;
}

/* RESPONSIVE */

@media (max-width:900px){

.container{
grid-template-columns:1fr;
}

.sidebar{
display:none;
}

.homeMessage{
font-size:18px;
}

.hamburger{
display:block;
}

/* MOBILE POSTS */

#mobilePostsTitle{
display:block;
margin:20px 0 5px 15px;
text-align:left;
}

#mobilePostList{
display:block;
margin-left:15px;
text-align:left;
}

#mobileToggle{
display:block;
margin-left:15px;
margin-top:10px;
cursor:pointer;
}

}
</style>
</head>

<body>

<header>告白 | CONFESSION</header>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<div class="mobileMenu" id="mobileMenu">
<p>
This space is for unspoken feelings.<br><br>
Be kind with words.
</p>
</div>

<div class="homeMessage">
Words left unsaid often stay the longest in the heart.
</div>
<h3 id="mobilePostsTitle">Posts</h3>
<div id="mobilePostList"></div>
<div id="mobileToggle" class="mobileToggle" style="display:none;" onclick="toggleMobilePosts()">
▼ Show more
</div>

<div class="container">

<div class="sidebar">
<h3>Posts</h3>
<div id="postList"></div>
</div>

<div class="app">

<div id="postContent">Select a post to read.</div>

<div id="comments"></div>

<div class="commentBox">
<input id="name" placeholder="Your name">
<textarea id="commentText" placeholder="Write comment"></textarea>

<input id="website" style="display:none">

<button onclick="postComment()">Comment/コメント</button>
</div>

</div>

<div class="sidebar">
<h3>Message</h3>
<p>
This place is for feelings left unsaid.<br><br>
Be kind with words.
</p>
</div>

</div>

<footer>

Made with 🖤 | 告白 2026

<button id="adminBtn" onclick="adminLogin()">+</button>
<button id="logoutBtn" onclick="adminLogout()">×</button>

</footer>

<div class="editor" id="editor">

<h3>Create Post</h3>

<input id="postTitle" placeholder="Post title">
<textarea id="postBody" rows="6" placeholder="Write post..."></textarea>

<button onclick="publishPost()">Publish</button>
<button onclick="closeEditor()">Cancel</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAVwHUPpyJPQBgvJE43DIDap0gQM-0oJHc",
authDomain:"akiga-suki.firebaseapp.com",
databaseURL:"https://akiga-suki-default-rtdb.firebaseio.com",
projectId:"akiga-suki"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentPost=null;
let isAdmin=localStorage.getItem("admin")==="true";
let commentListener=null;
let pageLoaded=Date.now();

let mobilePostCount = 0;
let hiddenMobilePosts = [];
let mobileExpanded = false;
/* BANNED WORD FILTER */

const bannedWords=[
"fuck","shit","bitch","asshole",
"http://","https://","www."
];

function containsBannedWord(text){
const lower=text.toLowerCase();
return bannedWords.some(word=>lower.includes(word));
}

/* MOBILE MENU */

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("open");
}
/*mobile toggle*/
function toggleMobilePosts(){

mobileExpanded = !mobileExpanded;

hiddenMobilePosts.forEach(p=>{
p.style.display = mobileExpanded ? "block" : "none";
});

document.getElementById("mobileToggle").innerText =
mobileExpanded ? "▲ Show less" : "▼ Show more";

}
/* ADMIN */

function adminLogin(){

const user=prompt("Username");
const pass=prompt("Password");

if(user==="******" && pass==="******"){

isAdmin=true;
localStorage.setItem("admin","true");

document.getElementById("editor").style.display="block";

}else{
alert("Wrong login");
}

}

function adminLogout(){

localStorage.removeItem("admin");
isAdmin=false;

alert("Admin logged out");
location.reload();

}

function closeEditor(){
document.getElementById("editor").style.display="none";
}

/* CREATE POST */

function publishPost(){

const title=document.getElementById("postTitle").value;
const content=document.getElementById("postBody").value;

if(!title||!content) return;

const featured=confirm("Make this a featured post?");
let mobilePostCount = 0;
let hiddenMobilePosts = [];
let mobileExpanded = false;
db.ref("posts").push({
title,
content,
time:Date.now(),
featured
});

closeEditor();

}

/* LOAD POSTS */

db.ref("posts").limitToLast(50).on("child_added", snap=>{

const data=snap.val();
const key=snap.key;

const createPost=()=>{

const div=document.createElement("div");
div.className="postItem";
div.innerText=data.featured ? "📌 "+data.title : data.title;
div.onclick=()=>loadPost(key);

return div;

};

/* desktop post */

const desktop=createPost();
const list=document.getElementById("postList");

data.featured ? list.prepend(desktop) : list.appendChild(desktop);

/* mobile post */

const mobileDiv=createPost();
const mobileContainer=document.getElementById("mobilePostList");

mobilePostCount++;

if(mobilePostCount<=3){

data.featured ? mobileContainer.prepend(mobileDiv) : mobileContainer.appendChild(mobileDiv);

}else{

mobileDiv.style.display="none";
mobileContainer.appendChild(mobileDiv);

hiddenMobilePosts.push(mobileDiv);

if(window.innerWidth <= 900){
document.getElementById("mobileToggle").style.display="block";
}

}

});

/* LOAD POST */

function loadPost(id){

currentPost=id;

db.ref("posts/"+id).once("value",snap=>{

const data=snap.val();
const date=new Date(data.time);

let adminControls="";

if(isAdmin){
adminControls=`<button onclick="deletePost('${id}')">Delete Post</button>`;
}

document.getElementById("postContent").innerHTML=`

<h2>${data.title}</h2>
<small>${date.toLocaleString()}</small>
<p style="margin-top:10px">${data.content}</p>
<div style="margin-top:15px">${adminControls}</div>

`;

});

loadComments(id);

}

/* DELETE POST */

function deletePost(id){

if(!confirm("Delete this post?")) return;

db.ref("posts/"+id).remove();
db.ref("comments/"+id).remove();

document.getElementById("postContent").innerHTML="Post deleted.";

}

/* COMMENT */

function postComment(){

if(!currentPost) return;

const name=document.getElementById("name").value;
const text=document.getElementById("commentText").value;
const botTrap=document.getElementById("website").value;

if(botTrap!=="") return;

if(Date.now()-pageLoaded<3000){
alert("Please wait a moment before commenting.");
return;
}

if(containsBannedWord(text)){
alert("Your comment contains blocked words.");
return;
}

if(!name||!text) return;

db.ref("comments/"+currentPost).push({
name,
text,
time:Date.now()
});

document.getElementById("commentText").value="";
document.getElementById("name").value="";

}

/* LOAD COMMENTS */

function loadComments(id){

document.getElementById("comments").innerHTML="";

if(commentListener){
db.ref("comments/"+currentPost).off("child_added",commentListener);
}

commentListener=db.ref("comments/"+id).on("child_added",snap=>{

const d=snap.val();
const key=snap.key;

let del="";

if(isAdmin){
del=`<button onclick="deleteComment('${id}','${key}')">Delete</button>`;
}

const div=document.createElement("div");
div.className="comment";

div.innerHTML=`<b>${d.name}</b><br>${d.text}<br>${del}`;

document.getElementById("comments").appendChild(div);

});

}

/* DELETE COMMENT */

function deleteComment(post,comment){

if(!confirm("Delete comment?")) return;

db.ref("comments/"+post+"/"+comment).remove();

}

/* ADMIN UI */

if(isAdmin){
document.getElementById("logoutBtn").style.display="inline-block";
}

/* CLOSE MOBILE MENU */

document.addEventListener("click",e=>{

const menu=document.getElementById("mobileMenu");
const button=document.querySelector(".hamburger");

if(!menu.contains(e.target)&&!button.contains(e.target)){
menu.classList.remove("open");
}

});

/* HEADER PARALLAX */

window.addEventListener("scroll",()=>{

const header=document.querySelector("header");
const offset=window.pageYOffset;

header.style.backgroundPositionY=offset*0.4+"px";

});

</script>

</body>
</html>
