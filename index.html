<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Confessions 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* ===== DARK BACKGROUND ===== */
body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    color:white;
}

/* ===== LIGHT FLOATING HEARTS ===== */
.heart{
    position:fixed;
    bottom:-50px;
    font-size:20px;
    color:rgba(255,255,255,0.9);
    text-shadow:0 0 10px rgba(255,255,255,0.8);
    animation:floatUp linear infinite;
    pointer-events:none;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:0.8;
    }
    100%{
        transform:translateY(-110vh) scale(1.6);
        opacity:0;
    }
}

/* ===== HEADER ===== */
header{
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    padding:15px;
    text-align:center;
    font-weight:bold;
    font-size:20px;
    color:#ff9ecb;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* ===== LAYOUT ===== */
.container{
    flex:1;
    display:grid;
    grid-template-columns:200px 1fr 200px;
    gap:15px;
    padding:15px;
}

/* ===== SIDEBARS ===== */
.sidebar{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:15px;
    backdrop-filter:blur(15px);
}

/* ===== MAIN APP ===== */
.app{
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:20px;
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.1);
}

textarea{
    width:100%;
    padding:10px;
    border-radius:15px;
    border:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

textarea::placeholder{
    color:#ccc;
}

button{
    margin-top:8px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#ff4d9d;
    color:white;
    transition:0.3s;
}

button:hover{
    background:#ff1f7a;
}

.message{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:15px;
    margin-top:10px;
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.actions{
    margin-top:5px;
    display:flex;
    gap:10px;
}

.featured{
    background:rgba(255,77,157,0.2);
    padding:10px;
    border-radius:15px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
    border:1px solid rgba(255,255,255,0.2);
}

/* ===== FOOTER ===== */
footer{
    background:rgba(0,0,0,0.6);
    padding:10px;
    text-align:center;
    font-size:14px;
    color:#ff9ecb;
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
    .sidebar{
        display:none;
    }
}
</style>
</head>

<body>

<header>💖 Love Confessions</header>

<div class="container">
    
    <div class="sidebar">
        💌 Spread love <br><br>
        ❤️ Be kind <br>
        🌸 Stay soft
    </div>

    <div class="app">
        <div id="featuredBox" class="featured">
            💌 Daily Featured Confession Loading...
        </div>

        <textarea id="input" rows="3" placeholder="Write your confession..."></textarea>
        <button onclick="postConfession()">Post 💌</button>

        <div id="messages"></div>
    </div>

    <div class="sidebar">
        🌹 Anonymous space <br><br>
        ✨ Positive vibes only
    </div>

</div>

<footer>
    Made with ❤️ | Love Confessions 2026
</footer>


<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAVwHUPpyJPQBgvJE43DIDap0gQM-0oJHc",
  authDomain: "akiga-suki.firebaseapp.com",
  databaseURL: "https://akiga-suki-default-rtdb.firebaseio.com",
  projectId: "akiga-suki"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== Floating Hearts Generator ===== */
function createHeart(){
    const heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,800);

/* ===== Post Confession ===== */
function postConfession(){
    const text=document.getElementById("input").value;
    if(!text.trim()) return;

    db.ref("confessions").push({
        message:text,
        likes:0,
        time:Date.now()
    });

    document.getElementById("input").value="";
}

/* ===== Display ===== */
db.ref("confessions").limitToLast(50).on("child_added",snap=>{
    const data=snap.val();
    const key=snap.key;

    const div=document.createElement("div");
    div.className="message";

    div.innerHTML=`
        <div>${data.message}</div>
        <div class="actions">
            <button onclick="like('${key}',${data.likes})">❤️ ${data.likes}</button>
            <button onclick="deletePost('${key}')">🗑 Admin</button>
        </div>
    `;

    document.getElementById("messages").prepend(div);
});

/* ===== Like ===== */
function like(id,currentLikes){
    db.ref("confessions/"+id).update({
        likes:currentLikes+1
    });
}

/* ===== Delete ===== */
function deletePost(id){
    const pass=prompt("Enter admin password:");
    if(pass==="admin123"){
        db.ref("confessions/"+id).remove();
        location.reload();
    }
}
</script>

</body>
</html>
