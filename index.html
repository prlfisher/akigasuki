<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Daily Love ??</title>

        <style>
            body {
                    margin: 0;
                        padding: 0;
                            display: flex;
                                justify-content: center;
                                    align-items: center;
                                        height: 100vh;
                                            font-family: Arial, sans-serif;
                                                transition: 0.4s;
                                                    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
                                                    }

                                                    body.dark {
                                                            background: #121212;
                                                                color: white;
                                                                }

                                                                .container {
                                                                        background: white;
                                                                            padding: 30px;
                                                                                border-radius: 20px;
                                                                                    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                                                                                        text-align: center;
                                                                                            max-width: 400px;
                                                                                                width: 90%;
                                                                                                    transition: 0.4s;
                                                                                                    }

                                                                                                    body.dark .container {
                                                                                                            background: #1e1e1e;
                                                                                                            }

                                                                                                            h1 {
                                                                                                                color: #ff4d6d;
                                                                                                                }

                                                                                                                #message {
                                                                                                                    margin: 20px 0;
                                                                                                                        font-size: 18px;
                                                                                                                            min-height: 60px;
                                                                                                                            }

                                                                                                                            button {
                                                                                                                                padding: 10px 15px;
                                                                                                                                    margin: 5px;
                                                                                                                                        border: none;
                                                                                                                                            border-radius: 20px;
                                                                                                                                                cursor: pointer;
                                                                                                                                                    background: #ff4d6d;
                                                                                                                                                        color: white;
                                                                                                                                                        }

                                                                                                                                                        input {
                                                                                                                                                            padding: 8px;
                                                                                                                                                                width: 80%;
                                                                                                                                                                    border-radius: 10px;
                                                                                                                                                                        border: 1px solid #ccc;
                                                                                                                                                                            margin-top: 10px;
                                                                                                                                                                            }
                                                                                                                                                                            </style>
                                                                                                                                                                            </head>

                                                                                                                                                                            <body>

                                                                                                                                                                            <div class="container">
                                                                                                                                                                                <h1>Daily Love ??</h1>
                                                                                                                                                                                    <div id="message">Loading love...</div>

                                                                                                                                                                                        <button onclick="newRandomMessage()">New Message</button>
                                                                                                                                                                                            <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

                                                                                                                                                                                                <div>
                                                                                                                                                                                                        <input type="text" id="userMessage" placeholder="Write your love message">
                                                                                                                                                                                                                <button onclick="addMessage()">Add</button>
                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                    let defaultMessages = [
                                                                                                                                                                                                                        "You are my today and all of my tomorrows.",
                                                                                                                                                                                                                            "Every moment with you feels magical.",
                                                                                                                                                                                                                                "My heart chooses you. Always.",
                                                                                                                                                                                                                                    "With you, life is beautiful.",
                                                                                                                                                                                                                                        "You are my favorite notification.",
                                                                                                                                                                                                                                            "I fall in love with you more every day."
                                                                                                                                                                                                                                            ];

                                                                                                                                                                                                                                            let storedMessages = JSON.parse(localStorage.getItem("loveMessages"));
                                                                                                                                                                                                                                            let messages = storedMessages ? storedMessages : defaultMessages;

                                                                                                                                                                                                                                            // Show daily message
                                                                                                                                                                                                                                            function showDailyMessage() {
                                                                                                                                                                                                                                                let today = new Date().toDateString();
                                                                                                                                                                                                                                                    let savedDate = localStorage.getItem("lastDate");
                                                                                                                                                                                                                                                        let savedMessage = localStorage.getItem("dailyMessage");

                                                                                                                                                                                                                                                            if (savedDate === today && savedMessage) {
                                                                                                                                                                                                                                                                    document.getElementById("message").innerText = savedMessage;
                                                                                                                                                                                                                                                                        } else {
                                                                                                                                                                                                                                                                                let randomMessage = messages[Math.floor(Math.random() * messages.length)];
                                                                                                                                                                                                                                                                                        localStorage.setItem("dailyMessage", randomMessage);
                                                                                                                                                                                                                                                                                                localStorage.setItem("lastDate", today);
                                                                                                                                                                                                                                                                                                        document.getElementById("message").innerText = randomMessage;
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                            function newRandomMessage() {
                                                                                                                                                                                                                                                                                                                let randomMessage = messages[Math.floor(Math.random() * messages.length)];
                                                                                                                                                                                                                                                                                                                    document.getElementById("message").innerText = randomMessage;
                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                    function toggleDarkMode() {
                                                                                                                                                                                                                                                                                                                        document.body.classList.toggle("dark");
                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                        function addMessage() {
                                                                                                                                                                                                                                                                                                                            let userInput = document.getElementById("userMessage").value;
                                                                                                                                                                                                                                                                                                                                if (userInput.trim() !== "") {
                                                                                                                                                                                                                                                                                                                                        messages.push(userInput);
                                                                                                                                                                                                                                                                                                                                                localStorage.setItem("loveMessages", JSON.stringify(messages));
                                                                                                                                                                                                                                                                                                                                                        document.getElementById("userMessage").value = "";
                                                                                                                                                                                                                                                                                                                                                                alert("Love message added ??");
                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                    showDailyMessage();
                                                                                                                                                                                                                                                                                                                                                                    </script>

                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                    </html>
                                                                                                    }
                                                                }
                                                    }
            }
